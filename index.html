<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FM Center - Venezuela Llanera</title>
    <style>
        body { background: #000; color: #fecb00; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .box { background: #1a1a1a; padding: 30px; border-radius: 20px; border: 2px solid #fecb00; width: 85%; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.9); }
        .boton { background: #003da5; color: white; border: none; padding: 20px; width: 100%; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .vol-container { margin-top: 20px; background: #222; padding: 10px; border-radius: 10px; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #fecb00; }
        #status { margin-top: 15px; color: #fff; font-size: 14px; min-height: 50px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="box">
    <h1 style="color:white; margin:0;">FM CENTER</h1>
    <h2 style="margin:5px 0; color:#fecb00;">VENEZUELA LLANERA</h2>
    
    <div id="status">Verificando conexión...</div>
    
    <button class="boton" onclick="reproducir()">▶ REPRODUCIR LLANERAS</button>

    <div class="vol-container">
        <label style="font-size: 11px;">VOLUMEN</label><br>
        <input type="range" id="volumen" min="0" max="1" step="0.1" value="0.8" oninput="document.getElementById('player').volume = this.value">
    </div>

    <audio id="player"></audio>
</div>

<script>
    // DATOS CORREGIDOS SEGÚN TU CAPTURA
    const config = {
        usuario: "miempresaprotik",
        repo: "FM-Center-Venezuela-", // AQUÍ ESTÁ EL GUION QUE FALTABA
        carpeta: "Musica"
    };

    let canciones = [];
    const player = document.getElementById('player');
    const status = document.getElementById('status');

    async function cargarBiblioteca() {
        // Forzamos la limpieza de caché con Math.random
        const url = `https://api.github.com/repos/${config.usuario}/${config.repo}/contents/${config.carpeta}?nocache=${Math.random()}`;
        
        try {
            const res = await fetch(url);
            
            if (res.status === 404) {
                status.innerText = "Error: Verifica que el repo se llame '" + config.repo + "' y la carpeta '" + config.carpeta + "'.";
                return;
            }

            const data = await res.json();
            
            if(Array.isArray(data)) {
                // Filtramos archivos mp3
                canciones = data.filter(f => f.name.toLowerCase().endsWith('.mp3'));
                status.innerText = "¡Conexión Exitosa!\nSe encontraron " + canciones.length + " temas llaneros.";
            }
        } catch (e) {
            status.innerText = "Error de conexión. Revisa tu señal.";
        }
    }

    function reproducir() {
        if (canciones.length === 0) {
            cargarBiblioteca();
            return;
        }
        const track = canciones[Math.floor(Math.random() * canciones.length)];
        status.innerText = "Sonando de tu carpeta:\n" + track.name;
        player.src = track.download_url;
        player.play().catch(() => status.innerText = "Error al reproducir. Toca de nuevo.");
        player.onended = reproducir;
    }

    window.onload = cargarBiblioteca;
</script>
</body>
</html>
