<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FM Center Venezuela Llaneras | El Sonido del Llano</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --amarillo: #fecb00; --azul: #003da5; --rojo: #cf142b;
            --fondo: #0a0a0a; --tarjeta: #1a1a1a;
        }

        body {
            background-color: var(--fondo);
            color: white;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at center, #1e1e1e 0%, #0a0a0a 100%);
        }

        .main-card {
            background: var(--tarjeta);
            width: 95%;
            max-width: 450px;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border: 1px solid #333;
            position: relative;
        }

        /* Bandera decorativa superior */
        .flag-top { height: 6px; width: 100%; display: flex; }
        .f-am { background: var(--amarillo); flex: 1; }
        .f-az { background: var(--azul); flex: 1; }
        .f-ro { background: var(--rojo); flex: 1; }

        .header { padding: 25px 15px; text-align: center; }
        .header h1 { 
            font-family: 'Oswald', sans-serif; 
            margin: 0; font-size: 1.8rem; 
            letter-spacing: 2px;
            color: var(--amarillo);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .header p { margin: 5px 0 0; font-size: 0.9rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }

        /* Contenedor Maestro de Medios */
        .media-display {
            width: 100%;
            background: #000;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-top: 1px solid #333;
            border-bottom: 1px solid #333;
        }

        /* Estilo para Audio Visual */
        #audio-ui { text-align: center; width: 100%; }
        .vinyl-disc {
            width: 120px; height: 120px;
            background: linear-gradient(45deg, #111, #333);
            border-radius: 50%;
            margin: 0 auto 15px;
            border: 5px solid #222;
            display: flex; align-items: center; justify-content: center;
            animation: rotate 5s linear infinite;
            box-shadow: 0 0 20px rgba(254, 203, 0, 0.2);
        }
        @keyframes rotate { from {transform: rotate(0deg);} to {transform: rotate(360deg);} }

        /* Video responsivo */
        video { width: 100%; height: auto; max-height: 300px; display: none; }

        .controls-area { padding: 30px 20px; text-align: center; }
        
        #now-playing {
            font-weight: bold;
            color: #eee;
            margin-bottom: 20px;
            min-height: 40px;
            font-size: 1.1rem;
        }

        audio { width: 100%; filter: invert(100%) hue-rotate(180deg) brightness(1.5); }

        .btn-next {
            background: linear-gradient(to right, var(--azul), #0056e0);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-family: 'Oswald', sans-serif;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 61, 165, 0.4);
            margin-top: 10px;
        }

        .btn-next:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 61, 165, 0.6); background: var(--amarillo); color: #000; }

        .footer-tag { font-size: 0.7rem; color: #555; margin-top: 20px; text-align: center; padding-bottom: 15px;}
    </style>
</head>
<body>

<div class="main-card">
    <div class="flag-top">
        <div class="f-am"></div><div class="f-az"></div><div class="f-ro"></div>
    </div>

    <div class="header">
        <h1>FM CENTER VENEZUELA</h1>
        <p>Llaneras | El Sonido del Llano</p>
    </div>

    <div class="media-display">
        <video id="vPlayer" controls></video>
        
        <div id="audio-ui">
            <div class="vinyl-disc">
                <span style="font-size: 40px;">📻</span>
            </div>
            <audio id="aPlayer" controls onended="playNext()"></audio>
        </div>
    </div>

    <div class="controls-area">
        <div id="now-playing">Cargando la siembra criolla...</div>
        <button class="btn-next" onclick="playNext()">SIGUIENTE CANCIÓN / VIDEO</button>
    </div>

    <div class="footer-tag">PROMOVIENDO EL FOLKLORE VENEZOLANO</div>
</div>

<script>
    // LISTA DE REPRODUCCIÓN (Añade aquí tus links de Archive.org)
    const biblioteca = [
        { 
            tipo: 'audio', 
            titulo: "Mi Joropo Relancino - Victor Véliz", 
            url: "https://archive.org/download/mi-joropo-relancino-victor-veliz-mp-3-128-k/Mi%20Joropo%20Relancino%20-%20Victor%20V%C3%A9liz.mp3" 
        },
        // Puedes copiar la línea anterior y pegar abajo para añadir más canciones
    ];

    const vPlayer = document.getElementById('vPlayer');
    const aPlayer = document.getElementById('aPlayer');
    const aUI = document.getElementById('audio-ui');
    const displayTitle = document.getElementById('now-playing');

    function playNext() {
        if (biblioteca.length === 0) return;

        const item = biblioteca[Math.floor(Math.random() * biblioteca.length)];
        displayTitle.innerText = item.titulo;

        if (item.tipo === 'video') {
            aPlayer.pause();
            aUI.style.display = 'none';
            vPlayer.style.display = 'block';
            vPlayer.src = item.url;
            vPlayer.play().catch(e => console.log("Click en 'Siguiente' para iniciar"));
            vPlayer.onended = playNext;
        } else {
            vPlayer.pause();
            vPlayer.style.display = 'none';
            aUI.style.display = 'block';
            aPlayer.src = item.url;
            aPlayer.play().catch(e => console.log("Click en 'Siguiente' para iniciar"));
            aPlayer.onended = playNext;
        }
    }

    // Iniciar automáticamente al cargar
    window.onload = playNext;
</script>

</body>
</html>
