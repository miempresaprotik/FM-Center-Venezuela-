<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FM Center - Venezuela Llaneras</title>
    <style>
        /* TU DISEÑO ORIGINAL SIN CAMBIOS */
        body { background: #000; color: #fecb00; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .box { 
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.8)), url('https://raw.githubusercontent.com/miempresaprotik/FM-Center-Venezuela-/main/Imagen/IMG_20250113_001927.jpg');
            background-size: cover; background-position: center; background-repeat: no-repeat; padding: 30px; border-radius: 25px; border: 2px solid #fecb00; width: 85%; max-width: 400px; box-shadow: 0 10px 50px rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; box-sizing: border-box; position: relative;
        }
        .logo-fm { position: absolute; top: 15px; right: 15px; width: 70px; height: auto; filter: drop-shadow(0 0 5px rgba(254, 203, 0, 0.5)); }
        .titulos { margin-top: 30px; } 
        .titulos h1 { color:white; margin:0; font-size: 26px; letter-spacing: 1px; }
        .titulos h2 { margin:-3px 0 20px 0; font-size: 18px; color: #fecb00; font-weight: normal; }
        #status { color: #fff; font-size: 14px; min-height: 55px; line-height: 1.4; white-space: pre-line; margin-bottom: 15px; width: 100%; font-weight: bold; }
        .boton { background: #003da5; color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: auto; }
        .boton:disabled { background: #444444 !important; color: #888888 !important; cursor: not-allowed !important; }
        
        .btn-sync { background: rgba(255, 255, 255, 0.1); color: #fff; border: 1px solid rgba(255, 255, 255, 0.3); padding: 5px 12px; border-radius: 20px; font-size: 10px; margin-top: 15px; cursor: pointer; }
        .btn-sync:disabled { opacity: 0.4; cursor: wait; }

        .vol-container { margin-top: 25px; background: rgba(34, 34, 34, 0.85); padding: 12px; border-radius: 15px; width: 100%; box-sizing: border-box; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #fecb00; }
        #reloj-mini { font-size: 12px; color: #fecb00; margin-top: 10px; font-weight: bold; opacity: 0.8; }

        .reserva-cont { margin-top: 12px; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .reserva-label { font-size: 9px; color: #aaa; letter-spacing: 1px; text-transform: uppercase; }
        .switch { position: relative; display: inline-block; width: 38px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 20px; border: 1px solid #fecb00; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #003da5; border-color: #fff; }
        input:checked + .slider:before { transform: translateX(18px); }
        #status-tanque { font-size: 9px; color: #fecb00; font-weight: bold; display: none; text-shadow: 1px 1px 1px #000; text-transform: uppercase;}
    </style>
</head>
<body>

<div class="box">
    <img src="https://raw.githubusercontent.com/miempresaprotik/FM-Center-Venezuela-/main/Imagen/Logo%20FM%20Center.png" class="logo-fm" alt="Logo">
    <div class="titulos"><h1>FM CENTER</h1><h2>VENEZUELA LLANERAS</h2></div>
    <div id="status">Sintonizando señal llanera...</div>
    <button id="btnPlay" class="boton" onclick="iniciarReproduccion()">▶ REPRODUCIR</button>
    
    <button id="btnSync" class="btn-sync" onclick="sincronizarPagina()">🔄 SINCRONIZAR SEÑAL</button>

    <div class="reserva-cont">
        <span class="reserva-label">MODO SIN CONEXIÓN</span>
        <label class="switch">
            <input type="checkbox" id="toggleOffline" onchange="gestionarModoReserva(this.checked)">
            <span class="slider"></span>
        </label>
        <div id="status-tanque">⛽ LISTA DISPONIBLE: <span id="cant-reserva">0</span>/20</div>
    </div>

    <div class="vol-container">
        <label style="color:#fecb00; font-size: 11px; font-weight: bold;">CONTROL DE VOLUMEN</label><br>
        <input type="range" id="volumen" min="0" max="1" step="0.1" value="0.8" oninput="ajustarVolumenManual(this.value)">
    </div>
    <div id="reloj-mini">Cargando sistema...</div>
    <audio id="player" crossorigin="anonymous"></audio>
</div>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(err => console.log("SW error", err));
    }

    const bibliotecas = [
        { usuario: "miempresaprotik", repo: "FM-Center-Venezuela-", carpeta: "Musica" },
        { usuario: "miempresapro2", repo: "Musica1", carpeta: "Musica0" },
        { usuario: "miempresapro1", repo: "FM-Center", carpeta: "Musica2" },
        { usuario: "miempresapro20", repo: "FM-Center-", carpeta: "Musica3" },
        { usuario: "papikkto002", repo: "FM-Center-", carpeta: "Musica4" }
    ];

    const saludos = {
        min15: [
            "Estás en sintonía de FM Center, la casa de la música llanera en Venezuela.",
            "Disfruta de la mejor Música Llanera, aquí en FM Center Venezuela, Música, Llano y Folklor.",
            "Sintonizas FM Center Venezuela Llaneras, Lo mejor de Nuestra Música Llanera.",
            "La señal que recorre el llano entero, transmitiendo para ti en FM Center.",
            "Siente el zapateo y el rugir del arpa en la emisora líder, FM Center Venezuela.",
            "Desde el corazón de Venezuela, llevamos nuestra esencia llanera a tu dispositivo."
        ],
        min30: [
            "No te apartes de nuestra señal, seguimos con lo mejor del arpa, cuatro y maracas.",
            "En cualquier rincón de Venezuela, FM Center es tu compañía llanera.",
            "En cualquier rincón de Venezuela, FM Center Venezuela, es tu emisora de Música Llanera.",
            "Donde suene un cuatro, ahí está FM Center acompañando tu jornada.",
            "Canto, verso y copla en una sola señal. Somos FM Center, puro sentimiento.",
            "Tu conexión directa con nuestras raíces llaneras sigue aquí, en FM Center."
        ],
        min45: [
            "FM Center Venezuela Llaneras, conectando nuestro folklore, pura Música.",
            "¡Arpa, maestro! Seguimos disfrutando de la verdadera esencia llanera.",
            "Reporta tu sintonía, estamos escuchando lo mejor del folklor, Esto es FM Center Venezuela Llaneras.",
            "El folklore no descansa y nosotros tampoco. FM Center, siempre llanera.",
            "Orgullo venezolano en cada nota musical. Sintonizas FM Center Llaneras.",
            "Llevamos el aroma de la sabana a tus oídos. FM Center, folklore sin fronteras."
        ]
    };

    let indicesLocucion = { min15: 0, min30: 0, min45: 0 };
    let listaMaestra = [], indiceActual = 0, volumenUsuario = 0.8, modoReservaActivo = false;
    let wakeLock = null; 
    const player = document.getElementById('player'), status = document.getElementById('status'), btnPlay = document.getElementById('btnPlay'), btnSync = document.getElementById('btnSync');

    async function activarMantenerEncendido() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
            }
        } catch (err) {}
    }

    function hablar(mensaje, animado = false) {
        window.speechSynthesis.cancel(); 
        setTimeout(() => {
            const volOriginal = volumenUsuario;
            player.volume = volOriginal * 0.15; 
            const speech = new SpeechSynthesisUtterance(mensaje);
            speech.lang = 'es-VE';
            speech.rate = animado ? 0.95 : 0.9;
            speech.onend = () => { player.volume = volOriginal; };
            speech.onerror = () => { player.volume = volOriginal; };
            window.speechSynthesis.speak(speech);
        }, 150);
    }

    function anunciarHora() {
        const ahora = new Date();
        const hh = ahora.getHours();
        const hora12 = hh % 12 || 12;
        const parteDia = hh >= 12 ? 'de la tarde' : 'de la mañana';
        hablar(`En FM Center, son las ${hora12}, ${hora12} ${parteDia}`);
    }

    function lanzarAnuncioMotivador(minuto) {
        let clave = `min${minuto}`;
        let lista = saludos[clave];
        hablar(lista[indicesLocucion[clave]], true);
        indicesLocucion[clave] = (indicesLocucion[clave] + 1) % lista.length;
    }

    function idSilencioso() {
        if (!localStorage.getItem('fm_v_id')) {
            localStorage.setItem('fm_v_id', 'VIS-' + Math.floor(Math.random() * 90000 + 10000));
        }
    }

    function guardarEstado() {
        if (!player.paused && player.currentTime > 0) {
            localStorage.setItem('ultimo_indice', indiceActual - 1);
            localStorage.setItem('segundo_exacto', player.currentTime);
            localStorage.setItem('timestamp_salida', Date.now());
            localStorage.setItem('nombre_pista', status.innerText);
        }
    }

    player.ontimeupdate = () => guardarEstado();

    async function gestionarModoReserva(activado) {
        modoReservaActivo = activado;
        localStorage.setItem('offline_pref', activado);
        document.getElementById('status-tanque').style.display = activado ? "block" : "none";
        if (activado) llenarTanque();
        else if ('caches' in window) await caches.delete('fm-center-v1');
    }

    async function llenarTanque() {
        if (!modoReservaActivo || !navigator.onLine) return;
        const cache = await caches.open('fm-center-v1');
        const keys = await cache.keys();
        document.getElementById('cant-reserva').innerText = keys.length;
        if (keys.length < 20) {
            let p = indiceActual;
            let d = 0;
            let invOffline = JSON.parse(localStorage.getItem('inv_tanque') || "[]");
            while (d < (20 - keys.length) && p < listaMaestra.length) {
                let t = listaMaestra[p];
                if (!(await cache.match(t.download_url))) {
                    try { 
                        await cache.add(new Request(t.download_url, { mode: 'cors' })); 
                        if(!invOffline.some(i => i.download_url === t.download_url)) invOffline.push(t);
                        d++; 
                    } catch(e){}
                }
                p++;
                document.getElementById('cant-reserva').innerText = keys.length + d;
            }
            localStorage.setItem('inv_tanque', JSON.stringify(invOffline));
        }
    }

    function sincronizarPagina() {
        localStorage.setItem('skip_active', 'true');
        localStorage.removeItem('segundo_exacto');
        localStorage.removeItem('timestamp_salida');
        localStorage.removeItem('nombre_pista');
        localStorage.setItem('lastSync', Date.now());
        location.reload();
    }

    function checkSyncCooldown() {
        const lastSync = localStorage.getItem('lastSync');
        if (lastSync) {
            const diff = Date.now() - parseInt(lastSync);
            if (diff < 150000) {
                btnSync.disabled = true;
                const restante = Math.ceil((150000 - diff) / 1000);
                btnSync.innerText = `SINC. BLOQUEADA (${restante}s)`;
                setTimeout(checkSyncCooldown, 1000);
            } else {
                btnSync.disabled = false;
                btnSync.innerText = "🔄 SINCRONIZAR SEÑAL";
            }
        }
    }

    async function reproducirSiguiente(forzarNueva = false) {
        if (indiceActual >= listaMaestra.length) indiceActual = 0;
        
        const tsSalida = parseInt(localStorage.getItem('timestamp_salida'));
        const ahora = Date.now();
        const tiempoFuera = tsSalida ? (ahora - tsSalida) : 0;
        const skip = localStorage.getItem('skip_active') === 'true';

        if (skip || forzarNueva || tiempoFuera >= 180000) {
            if (localStorage.getItem('ultimo_indice') !== null) {
                indiceActual = (parseInt(localStorage.getItem('ultimo_indice')) + 1) || 0;
            }
            if (indiceActual >= listaMaestra.length) indiceActual = 0;
            localStorage.removeItem('skip_active');
            localStorage.removeItem('segundo_exacto');
            localStorage.removeItem('nombre_pista');
        } 
        else if (tsSalida && tiempoFuera < 180000) {
            indiceActual = parseInt(localStorage.getItem('ultimo_indice')) || 0;
        }

        let track = listaMaestra[indiceActual];
        
        if (!navigator.onLine) {
            status.innerText = "Sintonía en reserva:\nEn espera de conexión";
            const tanqueOffline = JSON.parse(localStorage.getItem('inv_tanque') || "[]");
            if (tanqueOffline.length > 0) {
                track = tanqueOffline[0]; 
            }
        } else {
            if (!track) return;
            let nombre = track.name.replace(/\.mp3$/i, '').replace(/_/g, ' ').replace(/\(MP3_.*\)/gi, '');
            status.innerText = "Sonando:\n" + nombre;
        }

        if (!track) return;
        player.src = track.download_url;
        player.load(); 

        if (navigator.onLine && !skip && !forzarNueva) {
            const segGuardado = parseFloat(localStorage.getItem('segundo_exacto'));
            if (segGuardado && tiempoFuera < 180000) {
                player.currentTime = segGuardado + (tiempoFuera / 1000);
            }
        }

        indiceActual++;
        player.play().catch(() => {
            btnPlay.disabled = false;
            btnPlay.innerText = "▶ REPRODUCIR";
        });
        if (modoReservaActivo) llenarTanque();
    }

    function iniciarReproduccion() {
        btnPlay.disabled = true;
        btnPlay.innerText = "📻 EN EMISIÓN...";
        localStorage.setItem('radio_activa', 'true');
        activarMantenerEncendido();
        reproducirSiguiente(false);
    }

    async function cargarTodo() {
        idSilencioso();
        checkSyncCooldown();
        
        try {
            let promesas = bibliotecas.map(c => fetch(`https://api.github.com/repos/${c.usuario}/${c.repo}/contents/${c.carpeta}`).then(r => r.json()).catch(() => []));
            const resultados = await Promise.all(promesas);
            listaMaestra = [];
            resultados.forEach(data => { if(Array.isArray(data)) listaMaestra.push(...data.filter(f => f.name.toLowerCase().endsWith('.mp3'))); });
            
            // --- PUNTO PRECISO: MEZCLA ALEATORIA PARA EVITAR REPETICIÓN ---
            listaMaestra.sort(() => Math.random() - 0.5); 

            if(listaMaestra.length > 0) localStorage.setItem('resp_maestro', JSON.stringify(listaMaestra));
        } catch (e) {
            listaMaestra = JSON.parse(localStorage.getItem('inv_tanque') || "[]");
        }
        
        if(listaMaestra.length === 0) listaMaestra = JSON.parse(localStorage.getItem('resp_maestro') || "[]");

        if(listaMaestra.length > 0) {
            const skip = localStorage.getItem('skip_active') === 'true';
            const estabaEncendida = localStorage.getItem('radio_activa') === 'true';
            const nombreGuardado = localStorage.getItem('nombre_pista');

            if (skip) {
                status.innerText = "Saltando a nueva señal...";
            } else if (estabaEncendida) {
                if (nombreGuardado) status.innerText = nombreGuardado;
                indiceActual = parseInt(localStorage.getItem('ultimo_indice')) || 0;
            } else {
                status.innerText = "Señal sintonizada.";
            }

            btnPlay.disabled = false;
            if (localStorage.getItem('offline_pref') === 'true') {
                document.getElementById('toggleOffline').checked = true;
                gestionarModoReserva(true);
            }
        }
    }

    setInterval(() => {
        const ahora = new Date();
        const hh = ahora.getHours(), mm = ahora.getMinutes(), ss = ahora.getSeconds();
        const displayH = hh % 12 || 12, displayM = mm < 10 ? '0'+mm : mm, displayS = ss < 10 ? '0'+ss : ss;
        document.getElementById('reloj-mini').innerText = `SISTEMA ACTIVO: ${displayH}:${displayM}:${displayS} ${hh >= 12 ? 'PM' : 'AM'}`;
        
        if (ss === 0 && localStorage.getItem('radio_activa') === 'true') {
            if (mm === 0) anunciarHora();
            else if ([15, 30, 45].includes(mm)) lanzarAnuncioMotivador(mm);
        }
    }, 1000);

    document.addEventListener('visibilitychange', async () => {
        if (wakeLock !== null && document.visibilityState === 'visible') {
            activarMantenerEncendido();
        }
    });

    player.onerror = () => {
        localStorage.removeItem('segundo_exacto');
        reproducirSiguiente(true);
    };

    player.onended = () => {
        if (!navigator.onLine) {
            let inv = JSON.parse(localStorage.getItem('inv_tanque') || "[]");
            if (inv.length > 0) {
                inv.shift(); 
                localStorage.setItem('inv_tanque', JSON.stringify(inv));
                document.getElementById('cant-reserva').innerText = inv.length;
            }
        }
        localStorage.removeItem('segundo_exacto');
        localStorage.removeItem('timestamp_salida');
        localStorage.removeItem('nombre_pista');
        reproducirSiguiente(true);
    };

    window.onload = cargarTodo;
    window.addEventListener('online', llenarTanque);
    function ajustarVolumenManual(v) { volumenUsuario = parseFloat(v); player.volume = volumenUsuario; }
</script>
</body>
</html>
