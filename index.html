<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FM Center - Emisión Local</title>
    <style>
        body { background: #000; color: #fecb00; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .box { background: #1a1a1a; padding: 30px; border-radius: 20px; border: 2px solid #fecb00; width: 85%; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.9); }
        .boton { background: #003da5; color: white; border: none; padding: 20px; width: 100%; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .vol-container { margin-top: 20px; background: #222; padding: 10px; border-radius: 10px; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #fecb00; }
        #status { margin-top: 15px; color: #fff; font-size: 14px; min-height: 50px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="box">
    <h1 style="color:white; margin:0; font-size: 24px;">FM CENTER</h1>
    <h2 style="margin:5px 0; font-size: 18px; color: #fecb00;">VENEZUELA LLANERA</h2>
    
    <div id="status">Conectando a GitHub...</div>
    
    <button class="boton" onclick="reproducir()">▶ REPRODUCIR LLANERAS</button>

    <div class="vol-container">
        <label style="color:#fecb00; font-size: 11px;">CONTROL DE VOLUMEN</label><br>
        <input type="range" id="volumen" min="0" max="1" step="0.1" value="0.8" oninput="ajustarVolumen(this.value)">
    </div>

    <audio id="player"></audio>
</div>

<script>
    const usuario = "miempresaprotik"; 
    const repo = "FM-Center-Venezuela";
    const carpeta = "Musica"; 

    let canciones = [];
    const player = document.getElementById('player');
    const status = document.getElementById('status');

    async function cargarBiblioteca() {
        // Añadimos un número aleatorio al final de la URL para evitar el caché del navegador
        const urlApi = `https://api.github.com/repos/${usuario}/${repo}/contents/${carpeta}?t=${Math.random()}`;
        
        try {
            const res = await fetch(urlApi);
            const data = await res.json();
            
            if(Array.isArray(data)) {
                // Filtramos archivos .mp3, .m4a y .mp4
                canciones = data.filter(f => 
                    f.name.toLowerCase().endsWith('.mp3') || 
                    f.name.toLowerCase().endsWith('.m4a') ||
                    f.name.toLowerCase().endsWith('.mp4')
                );
                status.innerText = "¡Sistemas Listos!\nSe detectaron " + canciones.length + " canciones en la carpeta.";
            } else {
                status.innerText = "Error: No se encontró la carpeta 'Musica' o está vacía.";
            }
        } catch (e) {
            status.innerText = "Error de conexión con GitHub.\nRevisa tu internet o el nombre del repositorio.";
        }
    }

    function ajustarVolumen(valor) {
        player.volume = valor;
    }

    function reproducir() {
        if (canciones.length === 0) {
            status.innerText = "Buscando canciones de nuevo...";
            cargarBiblioteca();
            return;
        }

        const track = canciones[Math.floor(Math.random() * canciones.length)];
        status.innerText = "Sonando de GitHub:\n" + track.name;
        
        player.src = track.download_url;
        player.play().catch(() => {
            status.innerText = "Error al iniciar reproducción.\nIntenta pulsar el botón de nuevo.";
        });
        
        player.onended = reproducir;
    }

    // Iniciar carga al abrir la web
    window.onload = cargarBiblioteca;
</script>
</body>
</html>
