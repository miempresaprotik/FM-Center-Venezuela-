name: Actualizador de Playlist 🤖

on:
  schedule:
    - cron: '0 */12 * * *' # El robot despertará automáticamente cada 12 horas
  workflow_dispatch: # Este botón mágico nos permite ejecutarlo manualmente cuando queramos

permissions:
  contents: write # Le damos permiso al robot de guardar el archivo en tu repositorio

jobs:
  actualizar-lista:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Instalar entorno de trabajo
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Escanear cuentas y crear playlist.json
        run: |
          cat << 'EOF' > generador.js
          const fs = require('fs');

          // Tu lista de 6 cuentas y carpetas
          const bibliotecas = [
              { usuario: "miempresaprotik", repo: "FM-Center-Venezuela-", carpeta: "Musica" },
              { usuario: "miempresapro2", repo: "Musica1", carpeta: "Musica0" },
              { usuario: "miempresapro1", repo: "FM-Center", carpeta: "Musica2" },
              { usuario: "miempresapro20", repo: "FM-Center-", carpeta: "Musica3" },
              { usuario: "FMCenterVenezuela", repo: "Radio", carpeta: "Musica" },
              { usuario: "papikkto002", repo: "FM-Center-", carpeta: "Musica4" }
          ];

          async function generarLista() {
              let listaMaestra = [];
              console.log("Iniciando escaneo de bibliotecas de FM Center...");

              for (const bib of bibliotecas) {
                  const url = `https://api.github.com/repos/${bib.usuario}/${bib.repo}/contents/${bib.carpeta}`;
                  console.log(`Buscando en: ${bib.usuario}...`);
                  try {
                      const response = await fetch(url);
                      if (response.ok) {
                          const data = await response.json();
                          // Filtramos solo los mp3 y sacamos nombre y url
                          const audios = data.filter(f => f.name.toLowerCase().endsWith('.mp3')).map(f => ({
                              name: f.name,
                              download_url: f.download_url
                          }));
                          listaMaestra.push(...audios);
                          console.log(`✅ ${audios.length} canciones encontradas.`);
                      } else {
                          console.log(`❌ Fallo al leer ${bib.usuario} - O la carpeta está vacía.`);
                      }
                  } catch (e) {
                      console.log(`❌ Error de red buscando en ${bib.usuario}`);
                  }
              }

              // Guardamos el archivo final
              fs.writeFileSync('playlist.json', JSON.stringify(listaMaestra, null, 2));
              console.log(`\n🎉 ¡Éxito! playlist.json creado con ${listaMaestra.length} canciones en total.`);
          }

          generarLista();
          EOF
          node generador.js

      - name: Guardar cambios en GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist.json
          git commit -m "🤖 Actualización automática de playlist.json" || echo "No hay canciones nuevas para subir"
          git push
